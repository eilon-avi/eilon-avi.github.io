<svg width="800" height="740" viewBox="0 0 800 740" xmlns="http://www.w3.org/2000/svg" style="background-color: #f8fafc; font-family: system-ui, -apple-system, sans-serif;">
  <defs>
    <!-- Drop shadow for blocks -->
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#0f172a" flood-opacity="0.1"/>
    </filter>
  </defs>

  <!-- ================= LEGEND ================= -->
  <g transform="translate(150, 15)">
    <rect x="0" y="0" width="20" height="20" fill="#ffffff" stroke="#94a3b8" />
    <text x="28" y="15" font-size="13" font-weight="500" fill="#475569">Data Bit</text>
    
    <rect x="130" y="0" width="20" height="20" fill="#fef08a" stroke="#ca8a04" />
    <text x="158" y="15" font-size="13" font-weight="500" fill="#475569">Zero-Pad Bit</text>
    
    <rect x="280" y="0" width="20" height="20" fill="#f0fdf4" stroke="#22c55e" stroke-dasharray="3" />
    <text x="308" y="15" font-size="13" font-weight="500" fill="#475569">Empty (Becomes '=')</text>
  </g>

  <!-- ================= CASE 1: 1 BYTE (2 PADDING) ================= -->
  <g transform="translate(0, 60)">
    <!-- Top Polygons -->
    <polygon points="40,50 280,50 280,80 40,80" fill="#eff6ff" />

    <!-- Raw Bytes -->
    <rect x="40" y="0" width="240" height="50" fill="#eff6ff" stroke="#3b82f6" stroke-width="2" rx="6" filter="url(#shadow)"/>
    <text x="160" y="20" font-size="14" font-weight="700" fill="#1e3a8a" text-anchor="middle">Raw Byte 1 (8 bits)</text>
    <text x="160" y="38" font-size="13" fill="#3b82f6" font-weight="600" text-anchor="middle">Letter 'M'</text>

    <rect x="280" y="0" width="240" height="50" fill="#f0fdf4" stroke="#86efac" stroke-width="2" stroke-dasharray="6,4" rx="6" />
    <text x="400" y="30" font-size="14" font-weight="600" fill="#16a34a" text-anchor="middle">(Missing Byte)</text>

    <rect x="520" y="0" width="240" height="50" fill="#f0fdf4" stroke="#86efac" stroke-width="2" stroke-dasharray="6,4" rx="6" />
    <text x="640" y="30" font-size="14" font-weight="600" fill="#16a34a" text-anchor="middle">(Missing Byte)</text>

    <!-- Bottom Polygons -->
    <polygon points="40,110 220,110 220,140 40,140" fill="#fff7ed" />
    <polygon points="220,110 400,110 400,140 220,140" fill="#ffedd5" />

    <!-- Bits Stream -->
    <g transform="translate(0, 80)" font-family="monospace" font-size="15" fill="#0f172a" text-anchor="middle">
      <!-- M -->
      <g transform="translate(40,0)">
        <rect x="0" y="0" width="30" height="30" fill="#fff" stroke="#94a3b8"/><text x="15" y="21">0</text>
        <rect x="30" y="0" width="30" height="30" fill="#fff" stroke="#94a3b8"/><text x="45" y="21">1</text>
        <rect x="60" y="0" width="30" height="30" fill="#fff" stroke="#94a3b8"/><text x="75" y="21">0</text>
        <rect x="90" y="0" width="30" height="30" fill="#fff" stroke="#94a3b8"/><text x="105" y="21">0</text>
        <rect x="120" y="0" width="30" height="30" fill="#fff" stroke="#94a3b8"/><text x="135" y="21">1</text>
        <rect x="150" y="0" width="30" height="30" fill="#fff" stroke="#94a3b8"/><text x="165" y="21">1</text>
        <rect x="180" y="0" width="30" height="30" fill="#fff" stroke="#94a3b8"/><text x="195" y="21">0</text>
        <rect x="210" y="0" width="30" height="30" fill="#fff" stroke="#94a3b8"/><text x="225" y="21">1</text>
      </g>
      <!-- Pad + Empty 1 -->
      <g transform="translate(280,0)">
        <rect x="0" y="0" width="30" height="30" fill="#fef08a" stroke="#ca8a04"/><text x="15" y="21">0</text>
        <rect x="30" y="0" width="30" height="30" fill="#fef08a" stroke="#ca8a04"/><text x="45" y="21">0</text>
        <rect x="60" y="0" width="30" height="30" fill="#fef08a" stroke="#ca8a04"/><text x="75" y="21">0</text>
        <rect x="90" y="0" width="30" height="30" fill="#fef08a" stroke="#ca8a04"/><text x="105" y="21">0</text>
        <rect x="120" y="0" width="30" height="30" fill="#f0fdf4" stroke="#86efac" stroke-dasharray="4"/>
        <rect x="150" y="0" width="30" height="30" fill="#f0fdf4" stroke="#86efac" stroke-dasharray="4"/>
        <rect x="180" y="0" width="30" height="30" fill="#f0fdf4" stroke="#86efac" stroke-dasharray="4"/>
        <rect x="210" y="0" width="30" height="30" fill="#f0fdf4" stroke="#86efac" stroke-dasharray="4"/>
      </g>
      <!-- Empty 2 -->
      <g transform="translate(520,0)">
        <rect x="0" y="0" width="30" height="30" fill="#f0fdf4" stroke="#86efac" stroke-dasharray="4"/>
        <rect x="30" y="0" width="30" height="30" fill="#f0fdf4" stroke="#86efac" stroke-dasharray="4"/>
        <rect x="60" y="0" width="30" height="30" fill="#f0fdf4" stroke="#86efac" stroke-dasharray="4"/>
        <rect x="90" y="0" width="30" height="30" fill="#f0fdf4" stroke="#86efac" stroke-dasharray="4"/>
        <rect x="120" y="0" width="30" height="30" fill="#f0fdf4" stroke="#86efac" stroke-dasharray="4"/>
        <rect x="150" y="0" width="30" height="30" fill="#f0fdf4" stroke="#86efac" stroke-dasharray="4"/>
        <rect x="180" y="0" width="30" height="30" fill="#f0fdf4" stroke="#86efac" stroke-dasharray="4"/>
        <rect x="210" y="0" width="30" height="30" fill="#f0fdf4" stroke="#86efac" stroke-dasharray="4"/>
      </g>
    </g>

    <!-- Base64 Bytes -->
    <rect x="40" y="140" width="180" height="50" fill="#fff7ed" stroke="#f97316" stroke-width="2" rx="6" filter="url(#shadow)"/>
    <text x="130" y="160" font-size="14" font-weight="700" fill="#7c2d12" text-anchor="middle">Base64 (6 bits)</text>
    <text x="130" y="178" font-size="13" fill="#ea580c" font-weight="600" text-anchor="middle">Char 'T'</text>

    <rect x="220" y="140" width="180" height="50" fill="#fff7ed" stroke="#f97316" stroke-width="2" rx="6" filter="url(#shadow)"/>
    <text x="310" y="160" font-size="14" font-weight="700" fill="#7c2d12" text-anchor="middle">Base64 (+Pad)</text>
    <text x="310" y="178" font-size="13" fill="#ea580c" font-weight="600" text-anchor="middle">Char 'Q'</text>

    <rect x="400" y="140" width="180" height="50" fill="#f0fdf4" stroke="#22c55e" stroke-width="2" stroke-dasharray="6,4" rx="6" />
    <text x="490" y="160" font-size="14" font-weight="700" fill="#15803d" text-anchor="middle">Padding</text>
    <text x="490" y="178" font-size="14" fill="#16a34a" font-weight="600" text-anchor="middle">Char '='</text>

    <rect x="580" y="140" width="180" height="50" fill="#f0fdf4" stroke="#22c55e" stroke-width="2" stroke-dasharray="6,4" rx="6" />
    <text x="670" y="160" font-size="14" font-weight="700" fill="#15803d" text-anchor="middle">Padding</text>
    <text x="670" y="178" font-size="14" fill="#16a34a" font-weight="600" text-anchor="middle">Char '='</text>
  </g>

  <!-- ================= CASE 2: 2 BYTES (1 PADDING) ================= -->
  <g transform="translate(0, 280)">
    <!-- Top Polygons -->
    <polygon points="40,50 280,50 280,80 40,80" fill="#eff6ff" />
    <polygon points="280,50 520,50 520,80 280,80" fill="#dbeafe" />

    <!-- Raw Bytes -->
    <rect x="40" y="0" width="240" height="50" fill="#eff6ff" stroke="#3b82f6" stroke-width="2" rx="6" filter="url(#shadow)"/>
    <text x="160" y="20" font-size="14" font-weight="700" fill="#1e3a8a" text-anchor="middle">Raw Byte 1 (8 bits)</text>
    <text x="160" y="38" font-size="13" fill="#3b82f6" font-weight="600" text-anchor="middle">Letter 'M'</text>

    <rect x="280" y="0" width="240" height="50" fill="#eff6ff" stroke="#3b82f6" stroke-width="2" rx="6" filter="url(#shadow)"/>
    <text x="400" y="20" font-size="14" font-weight="700" fill="#1e3a8a" text-anchor="middle">Raw Byte 2 (8 bits)</text>
    <text x="400" y="38" font-size="13" fill="#3b82f6" font-weight="600" text-anchor="middle">Letter 'a'</text>

