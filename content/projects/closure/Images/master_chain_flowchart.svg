<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1300 600" width="100%" height="100%">
    <defs>
        <marker id="arrow-down" viewBox="0 0 10 10" refX="5" refY="10" markerWidth="5" markerHeight="5">
            <path d="M 0 0 L 5 10 L 10 0 z" fill="#8b949e" />
        </marker>
    </defs>

    <rect width="100%" height="100%" fill="#0d1117" rx="8" />

    <!-- Column Headers -->
    <text x="40" y="35" fill="#8b949e" font-family="system-ui, sans-serif" font-size="12" font-weight="bold" letter-spacing="1">STREAM DATA</text>
    <text x="380" y="35" fill="#8b949e" font-family="system-ui, sans-serif" font-size="12" font-weight="bold" letter-spacing="1">FILTER ACTION</text>
    <text x="960" y="35" fill="#8b949e" font-family="system-ui, sans-serif" font-size="12" font-weight="bold" letter-spacing="1">OUTPUT &amp; MUTATION</text>

    <!-- Column Dividers -->
    <line x1="360" y1="20" x2="360" y2="570" stroke="#30363d" stroke-width="1" stroke-dasharray="4" />
    <line x1="940" y1="20" x2="940" y2="570" stroke="#30363d" stroke-width="1" stroke-dasharray="4" />

    <!-- ==========================================
         STEP 1: Preamble
         ========================================== -->
    <rect x="20" y="55" width="1260" height="75" rx="6" fill="#161b22" stroke="#30363d" stroke-width="1.5" />
    <text x="40" y="80" fill="#58a6ff" font-family="system-ui, sans-serif" font-size="15" font-weight="bold">1. Preamble (Chain Start)</text>
    
    <text x="40" y="111" font-family="ui-monospace, Consolas, monospace" font-size="16">
        <tspan fill="#8b949e" font-weight="bold">[Raw File Bytes]</tspan>
    </text>

    <text x="380" y="98" font-family="ui-monospace, Consolas, monospace" font-size="16">
        <tspan fill="#8b949e">Filter: </tspan>
        <tspan fill="#e6edf3">B64E ➔ MULT_3×2 ➔ B64E</tspan>
    </text>

    <text x="960" y="111" font-family="ui-monospace, Consolas, monospace" font-size="16">
        <tspan fill="#a5d6ff" font-weight="bold">[Aligned File]</tspan>
    </text>

    <!-- Arrow 1 -->
    <line x1="100" y1="130" x2="100" y2="160" stroke="#8b949e" stroke-width="1.5" marker-end="url(#arrow-down)" />

    <!-- ==========================================
         STEP 2: Append
         ========================================== -->
    <rect x="20" y="160" width="1260" height="75" rx="6" fill="#161b22" stroke="#30363d" stroke-width="1.5" />
    <text x="40" y="185" fill="#58a6ff" font-family="system-ui, sans-serif" font-size="15" font-weight="bold">2. Append (Suffix)</text>
    
    <text x="40" y="216" font-family="ui-monospace, Consolas, monospace" font-size="16">
        <tspan fill="#a5d6ff" font-weight="bold">[Aligned File]</tspan>
    </text>

    <text x="380" y="203" font-family="ui-monospace, Consolas, monospace" font-size="16">
        <tspan fill="#8b949e">Filter: </tspan>
        <tspan fill="#e6edf3">Control Padding ➔ Appenders</tspan>
    </text>

    <text x="960" y="216" font-family="ui-monospace, Consolas, monospace" font-size="16">
        <tspan fill="#a5d6ff" font-weight="bold">[Aligned File]</tspan><tspan fill="#e3cbfb" font-weight="bold">[B64 Suffix]</tspan>
    </text>

    <!-- Arrow 2 -->
    <line x1="100" y1="235" x2="100" y2="265" stroke="#8b949e" stroke-width="1.5" marker-end="url(#arrow-down)" />

    <!-- ==========================================
         STEP 3: Shield
         ========================================== -->
    <rect x="20" y="265" width="1260" height="75" rx="6" fill="#161b22" stroke="#30363d" stroke-width="1.5" />
    <text x="40" y="290" fill="#58a6ff" font-family="system-ui, sans-serif" font-size="15" font-weight="bold">3. Shield</text>
    
    <text x="40" y="321" font-family="ui-monospace, Consolas, monospace" font-size="16">
        <tspan fill="#a5d6ff" font-weight="bold">[Aligned File]</tspan><tspan fill="#e3cbfb" font-weight="bold">[B64 Suffix]</tspan>
    </text>

    <text x="380" y="308" font-family="ui-monospace, Consolas, monospace" font-size="16">
        <tspan fill="#8b949e">Filter: </tspan>
        <tspan fill="#e6edf3">Pad for 'M' ➔ Appender('M')×N</tspan>
    </text>

    <text x="960" y="321" font-family="ui-monospace, Consolas, monospace" font-size="16">
        <tspan fill="#a5d6ff" font-weight="bold">[Aligned File]</tspan><tspan fill="#e3cbfb" font-weight="bold">[B64 Suffix]</tspan><tspan fill="#3fb950" font-weight="bold">MMMMMM</tspan>
    </text>

    <!-- Arrow 3 -->
    <line x1="100" y1="340" x2="100" y2="370" stroke="#8b949e" stroke-width="1.5" marker-end="url(#arrow-down)" />

    <!-- ==========================================
         STEP 4: Prepend
         ========================================== -->
    <rect x="20" y="370" width="1260" height="75" rx="6" fill="#161b22" stroke="#30363d" stroke-width="1.5" />
    <text x="40" y="395" fill="#58a6ff" font-family="system-ui, sans-serif" font-size="15" font-weight="bold">4. Prepend (Prefix)</text>
    
    <text x="40" y="426" font-family="ui-monospace, Consolas, monospace" font-size="16">
        <tspan fill="#a5d6ff" font-weight="bold">[Aligned File]</tspan><tspan fill="#e3cbfb" font-weight="bold">[B64 Suffix]</tspan><tspan fill="#3fb950" font-weight="bold">MMMMMM</tspan>
    </text>

    <text x="380" y="413" font-family="ui-monospace, Consolas, monospace" font-size="16">
        <tspan fill="#8b949e">Filter: </tspan>
        <tspan fill="#e6edf3">Prependers ➔ Cleanup (B64D ➔ B64E)</tspan>
    </text>

    <text x="960" y="426" font-family="ui-monospace, Consolas, monospace" font-size="16">
        <tspan fill="#ffa6a1" font-weight="bold">[B64 Prefix]</tspan><tspan fill="#a5d6ff" font-weight="bold">[Aligned File]</tspan><tspan fill="#e3cbfb" font-weight="bold">[B64 Suffix]</tspan>
    </text>

    <!-- Arrow 4 -->
    <line x1="100" y1="445" x2="100" y2="475" stroke="#8b949e" stroke-width="1.5" marker-end="url(#arrow-down)" />

    <!-- ==========================================
         STEP 5: Postamble
         ========================================== -->
    <rect x="20" y="475" width="1260" height="75" rx="6" fill="#161b22" stroke="#30363d" stroke-width="1.5" />
    <text x="40" y="500" fill="#58a6ff" font-family="system-ui, sans-serif" font-size="15" font-weight="bold">5. Postamble (Chain End)</text>
    
    <text x="40" y="531" font-family="ui-monospace, Consolas, monospace" font-size="16">
        <tspan fill="#ffa6a1" font-weight="bold">[B64 Prefix]</tspan><tspan fill="#a5d6ff" font-weight="bold">[Aligned File]</tspan><tspan fill="#e3cbfb" font-weight="bold">[B64 Suffix]</tspan>
    </text>

    <text x="380" y="518" font-family="ui-monospace, Consolas, monospace" font-size="16">
        <tspan fill="#8b949e">Filter: </tspan>
        <tspan fill="#e6edf3">B64D ➔ ANTI_MULT_3×2</tspan>
    </text>

    <text x="960" y="531" font-family="ui-monospace, Consolas, monospace" font-size="16">
        <tspan fill="#ff7b72" font-weight="bold">&lt;x&gt;</tspan><tspan fill="#79c0ff" font-weight="bold">[B64 File Data]</tspan><tspan fill="#d2a8ff" font-weight="bold">&lt;/x&gt;</tspan>
    </text>

</svg>